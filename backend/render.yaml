services:
  - type: web
    name: docmatrix-api
    runtime: python

    # Backend folder
    rootDir: backend

    # Free plan (change if you have a paid plan)
    plan: free

    # Install dependencies
    buildCommand: pip install -r requirements.txt

    # Start FastAPI
    startCommand: python run.py

    # Health Check
    healthCheckPath: /health

    envVars:
      # Force Python 3.11
      - key: PYTHON_VERSION
        value: 3.11.9

      # Application
      - key: DEBUG
        value: "false"

      - key: ENVIRONMENT
        value: production

      # Security
      - key: SECRET_KEY
        generateValue: true

      - key: JWT_SECRET_KEY
        generateValue: true

      # Set manually in Render Dashboard
      - key: ENCRYPTION_KEY
        sync: false

      # Supabase
      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_REDIRECT_URI
        sync: false

      - key: GOOGLE_DRIVE_REDIRECT_URI
        sync: false

      # Email
      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

      # Frontend
      - key: FRONTEND_URL
        sync: false